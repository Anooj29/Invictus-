<!DOCTYPE html>
<html>
<head>
    <title>Healthcare Robot Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            padding: 20px;
        }

        h2 {
            text-align: center;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #1976d2;
            color: white;
        }

        button:hover {
            background: #0d47a1;
        }

        input, select {
            padding: 8px;
            margin: 5px;
        }

        .flex {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        canvas {
            max-height: 300px;
        }
    </style>
</head>

<body>

<h2>Healthcare Robot Dashboard</h2>

<!-- ================= PERSON INFO ================= -->
<div class="card">
    <h3>Person Information</h3>
    <p><b>Name:</b> <span id="name">--</span></p>
    <p><b>Emotion:</b> <span id="emotion">--</span></p>
    <p><b>Distance:</b> <span id="distance">--</span> cm</p>
</div>

<!-- ================= HEALTH DATA ================= -->
<div class="card">
    <h3>Health Data</h3>
    <p><b>Temperature:</b> <span id="temp">--</span></p>
    <p><b>Pulse:</b> <span id="pulse">--</span></p>
    <p><b>ECG:</b> <span id="ecg">--</span></p>
</div>

<!-- ================= GRAPH ================= -->
<div class="card">
    <h3>Live Pulse Graph</h3>
    <canvas id="pulseChart"></canvas>
</div>

<!-- ================= COMMANDS ================= -->
<div class="card">
    <h3>Commands</h3>

    <div class="flex">
        <button onclick="sendCommand('yes buddy')">Yes Buddy</button>
        <button onclick="sendCommand('check temperature')">Check Temperature</button>
        <button onclick="sendCommand('check pulse')">Check Pulse</button>
        <button onclick="sendCommand('check ecg')">Check ECG</button>
    </div>
</div>

<!-- ================= MIC ================= -->
<div class="card">
    <h3>Voice Command</h3>
    <button onclick="startListening()">Start Microphone</button>
</div>

<!-- ================= MEDICINE REMINDER ================= -->
<div class="card">
    <h3>Medicine Reminder</h3>

    <label>Select Time:</label>
    <input type="time" id="reminder_time">

    <label>Select Slot:</label>
    <select id="reminder_slot">
        <option value="1">Compartment 1</option>
        <option value="2">Compartment 2</option>
        <option value="3">Compartment 3</option>
    </select>

    <button onclick="setReminder()">Set Reminder</button>
</div>

<script>
let pulseData = [];
let labels = [];

const ctx = document.getElementById('pulseChart').getContext('2d');

const pulseChart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: labels,
        datasets: [{
            label: 'Pulse',
            data: pulseData,
            borderColor: 'red',
            fill: false,
            tension: 0.3
        }]
    },
    options: {
        animation: false,
        scales: {
            y: {
                beginAtZero: false
            }
        }
    }
});

function updateData() {
    fetch('/get_data')
    .then(res => res.json())
    .then(data => {

        document.getElementById("name").innerText = data.name;
        document.getElementById("emotion").innerText = data.emotion;
        document.getElementById("distance").innerText = data.distance;
        document.getElementById("temp").innerText = data.temp;
        document.getElementById("pulse").innerText = data.pulse;
        document.getElementById("ecg").innerText = data.ecg;

        if (data.pulse && data.pulse !== "--") {

            let pulseValue = data.pulse.replace("PULSE:", "");
            pulseValue = parseInt(pulseValue);

            if (!isNaN(pulseValue)) {

                labels.push(new Date().toLocaleTimeString());
                pulseData.push(pulseValue);

                if (labels.length > 15) {
                    labels.shift();
                    pulseData.shift();
                }

                pulseChart.update();
            }
        }
    });
}

setInterval(updateData, 1000);

function sendCommand(cmd) {
    fetch('/send_command', {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({command: cmd})
    });
}

function startListening() {
    const recognition = new(window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-US";
    recognition.start();

    recognition.onresult = function(event) {
        const speech = event.results[0][0].transcript.toLowerCase();
        sendCommand(speech);
    };
}

function setReminder() {
    const time = document.getElementById("reminder_time").value;
    const slot = document.getElementById("reminder_slot").value;

    fetch('/set_reminder', {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            time: time,
            slot: slot
        })
    });

    alert("Medicine reminder set!");
}
</script>

</body>
</html>
